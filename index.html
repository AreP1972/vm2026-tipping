<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<title>Maihaugen Tippekonkurranse</title>
</head>
<body>

<script id="COWORK_DATA">
/* ================================================================
   COWORK: OPPDATER KUN DENNE BLOKKEN HVER DAG.
   Ikke endre noe annet i filen.

   Slik oppdaterer du:
   1. Endre DATO til dagens dato
   2. Øk DAG_NR med 1
   3. Oppdater KAMPER_SPILT (totalt antall kamper spilt så langt)
   4. Oppdater poeng, riktige, vinnere og feil for hver deltaker
   ================================================================ */

const DATA = {
  dato:          "20. juni 2026",
  dagNr:         10,
  kamperSpilt:   32,
  totaleKamper:  72,

  deltakere: [
    { navn: "Linus",    poeng: 29, riktige: 4,  vinnere: 17, feil: 11 },
    { navn: "Tobias",   poeng: 29, riktige: 6,  vinnere: 11, feil: 15 },
    { navn: "Are",      poeng: 28, riktige: 4,  vinnere: 16, feil: 12 },
    { navn: "Maia",     poeng: 27, riktige: 4,  vinnere: 15, feil: 13 },
    { navn: "Petter",   poeng: 27, riktige: 4,  vinnere: 15, feil: 13 },
    { navn: "Sarah",    poeng: 27, riktige: 5,  vinnere: 12, feil: 15 },
    { navn: "Tina",     poeng: 25, riktige: 3,  vinnere: 16, feil: 13 },
    { navn: "Filip",    poeng: 24, riktige: 3,  vinnere: 15, feil: 14 },
    { navn: "Malin",    poeng: 22, riktige: 3,  vinnere: 13, feil: 16 },
    { navn: "Hanne",    poeng: 21, riktige: 1,  vinnere: 18, feil: 13 },
    { navn: "Ine",      poeng: 21, riktige: 1,  vinnere: 18, feil: 13 },
    { navn: "Halvor",   poeng: 20, riktige: 2,  vinnere: 14, feil: 16 },
    { navn: "Ragnhild", poeng: 20, riktige: 3,  vinnere: 11, feil: 18 },
    { navn: "Maddi",    poeng: 19, riktige: 1,  vinnere: 16, feil: 15 },
    { navn: "Berit",    poeng: 18, riktige: 2,  vinnere: 12, feil: 18 },
    { navn: "Marcus",   poeng: 18, riktige: 1,  vinnere: 15, feil: 16 },
    { navn: "Max",      poeng: 18, riktige: 2,  vinnere: 12, feil: 18 },
    { navn: "Aage",     poeng: 15, riktige: 0,  vinnere: 15, feil: 17 }
  ]
};

/* ================================================================
   STOPP HER. Ikke endre noe nedenfor denne linjen.
   ================================================================ */
</script>

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html {
  background: #04130a;
  min-height: 100%;
}
body {
  background: #04130a;
  font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  color: #fff;
  min-height: 100vh;
  padding: 32px 16px 48px;
}
.page {
  max-width: 860px;
  margin: 0 auto;
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px 32px 32px;
  background: linear-gradient(180deg, #0d2e17 0%, #071a0e 100%);
  border-radius: 20px 20px 0 0;
  border-bottom: 1px solid rgba(200,168,75,0.25);
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -60px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 300px;
  background: radial-gradient(ellipse, rgba(255,245,180,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.badge {
  display: inline-block;
  background: #c8a84b; color: #071a0e;
  font-weight: 700; font-size: 12px;
  letter-spacing: 3px; text-transform: uppercase;
  padding: 5px 18px; border-radius: 100px; margin-bottom: 12px;
}
.vm-title {
  font-family: 'Bebas Neue', 'Arial Narrow', Arial, sans-serif;
  font-size: clamp(36px, 6vw, 64px);
  color: #fff; letter-spacing: 4px; line-height: 1;
}
.vm-sub {
  font-size: 14px; color: rgba(255,255,255,0.4);
  font-weight: 600; letter-spacing: 3px;
  text-transform: uppercase; margin-top: 6px;
}
.meta-row {
  display: flex; gap: 24px; justify-content: center; margin-top: 12px;
}
.meta-item {
  font-size: 13px; color: rgba(255,255,255,0.45);
  font-weight: 600; letter-spacing: 1px;
}
.meta-item span { color: #c8a84b; }

/* LEADER BOX */
.leader-box {
  background: linear-gradient(135deg, #0f2d18 0%, #0a1f10 100%);
  border: 1.5px solid rgba(200,168,75,0.5);
  padding: 28px 40px;
  text-align: center;
  position: relative; overflow: hidden;
}
.leader-box::after {
  content: '';
  position: absolute; top: 0; left: 50%;
  transform: translateX(-50%);
  width: 80%; height: 100%;
  background: radial-gradient(ellipse at 50% 0%, rgba(200,168,75,0.12) 0%, transparent 65%);
  pointer-events: none;
}
.leader-label {
  font-size: 11px; color: #c8a84b;
  letter-spacing: 5px; text-transform: uppercase;
  font-weight: 700; margin-bottom: 4px; position: relative; z-index: 1;
}
.leader-name {
  font-family: 'Bebas Neue', 'Arial Narrow', Arial, sans-serif;
  font-size: clamp(48px, 7vw, 80px);
  color: #c8a84b; letter-spacing: 5px; line-height: 0.9;
  position: relative; z-index: 1;
}
.leader-score {
  font-size: 16px; color: rgba(200,168,75,0.65);
  font-weight: 600; margin-top: 4px; position: relative; z-index: 1;
}

/* LEADERBOARD TABLE */
.leaderboard-wrap {
  background: #071a0e;
  padding: 0 0 8px;
}
.player-row {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 28px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  position: relative;
  animation: fadeUp 0.4s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.player-row:nth-child(n) { animation-delay: calc(var(--i) * 0.04s); }

/* Progress bar behind row */
.row-progress {
  position: absolute; left: 0; top: 0; height: 100%;
  opacity: 0.06; pointer-events: none;
  transition: width 0.6s ease;
}
.rank-1 .row-progress { background: #c8a84b; }
.rank-2 .row-progress { background: #b0b0be; }
.rank-3 .row-progress { background: #a06432; }
.rank-other .row-progress { background: #4a7a5a; }

/* Row backgrounds */
.rank-1 { background: rgba(200,168,75,0.06); border-left: 3px solid #c8a84b; }
.rank-2 { background: rgba(180,180,200,0.04); border-left: 3px solid rgba(180,180,200,0.4); }
.rank-3 { background: rgba(160,100,50,0.04); border-left: 3px solid rgba(160,100,50,0.4); }
.rank-other { border-left: 3px solid transparent; }

.rank-num {
  font-family: 'Bebas Neue', 'Arial Narrow', Arial, sans-serif;
  font-size: 22px; min-width: 32px; text-align: center;
  color: rgba(255,255,255,0.2); position: relative; z-index: 1;
}
.rank-1 .rank-num { color: #c8a84b; }
.rank-2 .rank-num { color: #c0c0cc; }
.rank-3 .rank-num { color: #a07850; }

.medal-icon { font-size: 22px; min-width: 28px; position: relative; z-index: 1; }

.player-info { flex: 1; position: relative; z-index: 1; min-width: 0; }
.player-name {
  font-family: 'Bebas Neue', 'Arial Narrow', Arial, sans-serif;
  font-size: 28px; letter-spacing: 2px; line-height: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rank-1 .player-name { color: #c8a84b; }
.rank-2 .player-name { color: #d0d0dc; }
.rank-3 .player-name { color: #c09060; }
.rank-other .player-name { color: rgba(255,255,255,0.75); }

.player-stats {
  font-size: 11px; color: rgba(255,255,255,0.28);
  font-weight: 600; margin-top: 2px; letter-spacing: 1px;
}

.score-col { text-align: right; position: relative; z-index: 1; min-width: 60px; }
.player-pts {
  font-family: 'Bebas Neue', 'Arial Narrow', Arial, sans-serif;
  font-size: 36px; line-height: 1; letter-spacing: 1px;
}
.rank-1 .player-pts { color: #c8a84b; }
.rank-2 .player-pts { color: #c0c0cc; }
.rank-3 .player-pts { color: #c09060; }
.rank-other .player-pts { color: rgba(255,255,255,0.6); }

.pts-lbl {
  font-size: 9px; color: rgba(255,255,255,0.25);
  letter-spacing: 2px; text-transform: uppercase; font-weight: 700;
}

/* FOOTER STATS */
.footer {
  display: flex; justify-content: space-around;
  background: #04130a;
  padding: 24px 32px;
  border-top: 1px solid rgba(200,168,75,0.15);
  border-radius: 0 0 20px 20px;
}
.foot-item { text-align: center; }
.foot-val {
  font-family: 'Bebas Neue', 'Arial Narrow', Arial, sans-serif;
  font-size: 32px; color: #fff; letter-spacing: 1px; line-height: 1;
}
.foot-lbl {
  font-size: 10px; color: rgba(255,255,255,0.3);
  font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px;
}
.foot-divider { width: 1px; background: rgba(255,255,255,0.07); align-self: stretch; }
</style>

<div class="page">
  <div id="app"></div>
</div>

<script>
const sorted   = [...DATA.deltakere].sort((a, b) => b.poeng - a.poeng);
const maxPoeng = sorted[0]?.poeng || 1;
const medals   = ['🥇','🥈','🥉'];

function rankClass(i) {
  if (i === 0) return 'rank-1';
  if (i === 1) return 'rank-2';
  if (i === 2) return 'rank-3';
  return 'rank-other';
}

function rankLabel(i) {
  return medals[i] ?? `${i + 1}.`;
}

const gap = sorted.length > 1 ? sorted[0].poeng - sorted[1].poeng : 0;
const pct  = DATA.totaleKamper > 0 ? Math.round(DATA.kamperSpilt / DATA.totaleKamper * 100) : 0;
const startDate = new Date(2026, 5, 11); // 11. juni 2026, lokal tid
const today = new Date();
today.setHours(0,0,0,0);
const dagNr = Math.floor((today - startDate) / (1000*60*60*24)) + 1;

document.getElementById('app').innerHTML = `
  <div class="header">
    <div class="badge">⚽ VM 2026</div>
    <div class="vm-title">MAIHAUGEN TIPPEKONKURRANSE</div>
    <div class="vm-sub">Gruppespill</div>
    <div class="meta-row">
      <div class="meta-item">📅 <span>${DATA.dato}</span></div>
      <div class="meta-item">Dag <span>${dagNr}</span></div>
    </div>
  </div>

  <div class="leader-box">
    <div class="leader-label">⚡ Dagens leder</div>
    <div class="leader-name">${sorted[0].navn}</div>
    <div class="leader-score">${sorted[0].poeng} poeng &nbsp;·&nbsp; ${sorted[0].riktige} korrekte resultater</div>
  </div>

  <div class="leaderboard-wrap">
    ${sorted.map((d, i) => `
      <div class="player-row ${rankClass(i)}" style="--i:${i}">
        <div class="row-progress" style="width:${maxPoeng > 0 ? Math.round(d.poeng / maxPoeng * 100) : 0}%"></div>
        <div class="rank-num">${i + 1}</div>
        <div class="medal-icon">${rankLabel(i)}</div>
        <div class="player-info">
          <div class="player-name">${d.navn}</div>
          <div class="player-stats">✓ ${d.riktige} riktige &nbsp;·&nbsp; ~ ${d.vinnere} vinnere &nbsp;·&nbsp; ✗ ${d.feil} feil</div>
        </div>
        <div class="score-col">
          <div class="player-pts">${d.poeng}</div>
          <div class="pts-lbl">poeng</div>
        </div>
      </div>
    `).join('')}
  </div>

  <div class="footer">
    <div class="foot-item">
      <div class="foot-val">${DATA.kamperSpilt} / ${DATA.totaleKamper}</div>
      <div class="foot-lbl">Kamper spilt</div>
    </div>
    <div class="foot-divider"></div>
    <div class="foot-item">
      <div class="foot-val">${DATA.totaleKamper - DATA.kamperSpilt}</div>
      <div class="foot-lbl">Gjenstår</div>
    </div>
    <div class="foot-divider"></div>
    <div class="foot-item">
      <div class="foot-val">${gap}</div>
      <div class="foot-lbl">Poeng gap</div>
    </div>
    <div class="foot-divider"></div>
    <div class="foot-item">
      <div class="foot-val">${pct}%</div>
      <div class="foot-lbl">Ferdig</div>
    </div>
  </div>
`;
</script>
</body>
</html>
