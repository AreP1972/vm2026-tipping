*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  background: #060e1f;
  font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  color: #e8eef8;
  min-height: 100vh;
}

body { padding: 24px 16px 80px; }
.page { max-width: 860px; margin: 0 auto; }

/* ── HERO HEADER ── */
.hero {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 4px;
  background: linear-gradient(160deg, #0b1d42 0%, #091530 50%, #071226 100%);
  border: 1px solid rgba(56, 139, 255, 0.18);
}
/* SVG as purely decorative background */
.hero-svg-wrap {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.hero-svg-wrap svg {
  width: 100%;
  height: 100%;
}
/* Text in normal flow — drives the height */
.hero-text {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 44px 20px 36px;
}
.hero-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(80, 160, 255, 0.8);
  margin-bottom: 6px;
  text-shadow: 0 0 20px rgba(40, 100, 255, 0.6);
}
.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(36px, 8vw, 86px);
  letter-spacing: 5px;
  line-height: 0.9;
  color: #fff;
  text-shadow: 0 0 60px rgba(40, 120, 255, 0.5), 0 2px 0 rgba(0,0,0,0.5);
}
.hero-title em {
  font-style: normal;
  color: #4da6ff;
}
.hero-sub {
  font-size: 12px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-top: 10px;
  font-weight: 600;
}
.hero-meta {
  display: flex;
  gap: 24px;
  justify-content: center;
  margin-top: 14px;
  flex-wrap: wrap;
}
.hero-meta-item {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(80,160,255,0.15);
  border-radius: 8px;
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.5);
}
.hero-meta-item span { color: #4da6ff; }

@media (max-width: 480px) {
  .hero-text { padding: 24px 14px 20px; }
  .hero-eyebrow { font-size: 9px; letter-spacing: 3px; margin-bottom: 4px; }
  .hero-title { font-size: 38px; letter-spacing: 3px; }
  .hero-sub { font-size: 9px; letter-spacing: 2px; margin-top: 6px; }
  .hero-meta { margin-top: 10px; gap: 8px; }
  .hero-meta-item { padding: 4px 10px; font-size: 11px; }
}

/* ── STANDINGS TABLE ── */
.standings {
  background: linear-gradient(180deg, #071428 0%, #060e1f 100%);
  border: 1px solid rgba(56, 139, 255, 0.12);
  border-top: none;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 18px 24px 14px;
  border-bottom: 1px solid rgba(56,139,255,0.08);
}
.section-header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
}

.player-row {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 20px;
  min-height: 58px;
  border-bottom: 1px solid rgba(255,255,255,0.035);
  position: relative;
  transition: background 0.15s;
  cursor: default;
}
.player-row:hover { background: rgba(80,140,255,0.04); }

/* colored left accent */
.player-row::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.top-1::before { background: linear-gradient(180deg, #ffd700, #ffb300); }
.top-2::before { background: linear-gradient(180deg, #c0cce0, #9aabb8); }
.top-3::before { background: linear-gradient(180deg, #cd8f4a, #a06030); }
.mid::before   { background: transparent; }
.bot-1::before { background: rgba(220,60,60,0.55); }
.bot-2::before { background: rgba(210,60,60,0.35); }
.bot-3::before { background: rgba(200,60,60,0.2); }

/* background shimmer for top */
.top-1 { background: rgba(255,215,0,0.04); }
.top-2 { background: rgba(192,204,224,0.025); }
.top-3 { background: rgba(205,143,74,0.03); }
.bot-1 { background: rgba(200,50,50,0.04); }

/* progress bar bg */
.row-prog {
  position: absolute;
  left: 3px; top: 0; bottom: 0;
  opacity: 0.06;
  pointer-events: none;
  transition: width 0.7s ease;
}
.top-1 .row-prog { background: #ffd700; }
.top-2 .row-prog { background: #c0cce0; }
.top-3 .row-prog { background: #cd8f4a; }
.mid   .row-prog { background: #3a78ff; }
.bot-1 .row-prog, .bot-2 .row-prog, .bot-3 .row-prog { background: #cc3333; }

.medal-col {
  font-size: 22px;
  min-width: 34px;
  text-align: center;
  position: relative;
  z-index: 1;
  line-height: 1;
}
.player-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 2px;
  position: relative;
  z-index: 1;
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.top-1 .player-name { color: #ffd700; }
.top-2 .player-name { color: #ccd8ea; }
.top-3 .player-name { color: #d09a60; }
.mid   .player-name { color: #cad7ee; }
.bot-1 .player-name,
.bot-2 .player-name,
.bot-3 .player-name { color: rgba(200,210,230,0.5); }

.player-sub {
  font-size: 11px;
  color: rgba(160,185,230,0.28);
  font-weight: 600;
  letter-spacing: 0.3px;
  margin-top: 1px;
}

.score-area {
  position: relative;
  z-index: 1;
  text-align: right;
  min-width: 60px;
}
.pts-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 38px;
  line-height: 1;
  letter-spacing: 1px;
}
.top-1 .pts-num { color: #ffd700; }
.top-2 .pts-num { color: #c0cce0; }
.top-3 .pts-num { color: #cd8f4a; }
.mid   .pts-num { color: rgba(120,165,255,0.7); }
.bot-1 .pts-num,
.bot-2 .pts-num,
.bot-3 .pts-num { color: rgba(210,80,80,0.6); }

.pts-unit {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(160,185,220,0.2);
  margin-top: -2px;
}

/* Not submitted */
.ns-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.025);
  border-left: 3px solid rgba(100,140,200,0.1);
  color: rgba(160,185,220,0.25);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
}

/* ── STATS ── */
.stats-wrap {
  margin-top: 4px;
  border: 1px solid rgba(56, 139, 255, 0.12);
  border-top: none;
  background: #050d1c;
  border-radius: 0 0 18px 18px;
  padding: 28px 24px 32px;
}
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media(max-width: 580px) { .stats-grid { grid-template-columns: 1fr; } }

.stat-card {
  background: rgba(56, 100, 200, 0.06);
  border: 1px solid rgba(56,139,255,0.1);
  border-radius: 14px;
  padding: 18px 20px;
}
.stat-card-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(80, 140, 255, 0.6);
  margin-bottom: 14px;
}

/* champion bars */
.c-row { display:flex; align-items:center; gap:10px; margin-bottom:7px; }
.c-name { font-size:13px; font-weight:700; min-width:108px; color: rgba(210,225,255,0.8); }
.c-bar-bg { flex:1; height:18px; border-radius:4px; background:rgba(255,255,255,0.05); overflow:hidden; }
.c-bar    { height:100%; border-radius:4px; background:linear-gradient(90deg,#1a4ccc,#4da6ff); }
.c-n { font-size:12px; font-weight:700; color:rgba(160,185,220,0.4); min-width:18px; text-align:right; }

/* norway meter */
.no-bar { display:flex; height:26px; border-radius:6px; overflow:hidden; margin-bottom:10px; }
.no-seg { display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:rgba(255,255,255,0.8); }
.no-win  { background:linear-gradient(90deg,#0e5c20,#1a8c35); }
.no-draw { background:linear-gradient(90deg,#4a4a00,#7a7a00); }
.no-loss { background:linear-gradient(90deg,#6a0e0e,#9a1a1a); }
.no-legend { display:flex; flex-wrap:wrap; gap:12px; }
.no-leg { display:flex; align-items:center; gap:5px; font-size:12px; font-weight:600; color:rgba(160,185,220,0.45); }
.no-dot { width:9px; height:9px; border-radius:50%; }

/* match results */
.m-row {
  display:flex; align-items:center; justify-content:space-between;
  padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size:13px;
}
.m-row:last-of-type { border:none; }
.m-badge { font-size:9px; letter-spacing:2px; color:rgba(100,140,255,0.4); font-weight:700; }
.m-teams { color:rgba(180,200,240,0.55); flex:1; margin:0 10px; }
.m-score { font-family:'Bebas Neue',sans-serif; font-size:22px; color:#4da6ff; letter-spacing:2px; }

/* progress bar */
.prog-row { display:flex; align-items:center; gap:10px; margin-top:14px; }
.prog-bg { flex:1; height:7px; border-radius:4px; background:rgba(255,255,255,0.05); overflow:hidden; }
.prog-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,#1a4ccc,#4da6ff); }
.prog-txt { font-size:12px; font-weight:700; color:#4da6ff; min-width:40px; text-align:right; }

/* max points table */
.mp-row {
  display:flex; justify-content:space-between; font-size:13px;
  padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.045);
}
.mp-row:last-child { border:none; font-size:14px; font-weight:700; margin-top:6px; }
.mp-lbl { color:rgba(180,200,240,0.45); }
.mp-val { color:#4da6ff; font-weight:700; }
.mp-total { color:#ffd700 !important; font-family:'Bebas Neue',sans-serif; font-size:22px; }

/* footer strip */
.footer-strip {
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
  gap: 10px;
  padding: 22px 24px;
  background: #040b18;
  border: 1px solid rgba(56,139,255,0.08);
  border-top: none;
  margin-top: -4px;
  border-radius: 0 0 20px 20px;
}
.f-item { text-align:center; }
.f-val {
  font-family:'Bebas Neue',sans-serif;
  font-size:32px; letter-spacing:1px; line-height:1;
  color:#4da6ff;
}
.f-lbl {
  font-size:9px; font-weight:700; letter-spacing:3px;
  text-transform:uppercase; color:rgba(160,185,220,0.25); margin-top:3px;
}
</style>

        <line x1="100" y1="92"  x2="140" y2="92"/>
        <!-- trophy dot at end -->
        <circle cx="145" cy="92" r="4" fill="#ffd700" stroke="#ffd700" opacity="0.8"/>
      </g>

      <!-- Stars scattered -->
      <g fill="#4da6ff" opacity="0.18">
        <circle cx="160" cy="30" r="1.2"/>
        <circle cx="340" cy="18" r="0.9"/>
        <circle cx="520" cy="22" r="1.4"/>
        <circle cx="700" cy="15" r="1"/>
        <circle cx="800" cy="40" r="1.2"/>
        <circle cx="60"  cy="160" r="0.8"/>
        <circle cx="820" cy="180" r="1"/>
        <circle cx="260" cy="240" r="0.9"/>
        <circle cx="600" cy="245" r="1.1"/>
      </g>

      <!-- Bottom fade -->
      <rect width="860" height="60" y="250" fill="url(#bgGlow)" opacity="0.6"/>
    </svg>
  </div>

  <div class="hero-text">
    <div class="hero-eyebrow">⚡ VM 2026 — Sluttspill</div>
    <div class="hero-title">MAIHAUGEN<br><em>PLAYOFFS</em></div>
    <div class="hero-sub">16-delsfinale · Kvartfinale · Semifinale · Finale</div>
    <div class="hero-meta">
      <div class="hero-meta-item">📅 <span id="dato"></span></div>
      <div class="hero-meta-item">Kamper: <span id="kampMeta"></span></div>
    </div>
  </div>
</div>

<!-- ── STANDINGS ── -->
<div class="standings" id="standingsWrap">
  <div class="section-header">
    <div class="section-header-title">🏆 Stillinger</div>
  </div>
  <div id="playerList"></div>
</div>

<!-- ── STATS ── -->
<div class="stats-wrap">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:rgba(80,140,255,0.5);margin-bottom:18px;">STATISTIKK</div>
  <div class="stats-grid" id="statsGrid"></div>
</div>

<!-- ── FOOTER ── -->
<div class="footer-strip" id="footerStrip"></div>

<script>
(function() {
  const d = DATA;

  document.getElementById('dato').textContent = d.oppdatert;
  document.getElementById('kampMeta').innerHTML = `<span>${d.kamperSpilt} / ${d.totaleKamper}</span>`;

  const sorted = [...d.deltakere].sort((a,b) => b.poeng - a.poeng || a.navn.localeCompare(b.navn, 'no'));
  const total = sorted.length;

  // Rank assignment (tied = same rank)
  function getRanks(arr) {
    const ranks = [];
    let r = 1;
    for (let i = 0; i < arr.length; i++) {
      if (i > 0 && arr[i].poeng === arr[i-1].poeng) {
        ranks.push(ranks[i-1]);
      } else {
        ranks.push(r);
      }
      r = i + 2;
    }
    return ranks;
  }
  const ranks = getRanks(sorted);
  const uniqueRanks = [...new Set(ranks)].sort((a,b)=>a-b);

  function rowClass(rank) {
    if (rank === uniqueRanks[0]) return 'top-1';
    if (uniqueRanks[1] !== undefined && rank === uniqueRanks[1]) return 'top-2';
    if (uniqueRanks[2] !== undefined && rank === uniqueRanks[2]) return 'top-3';
    const last = uniqueRanks[uniqueRanks.length-1];
    const sLast = uniqueRanks[uniqueRanks.length-2];
    const tLast = uniqueRanks[uniqueRanks.length-3];
    if (rank === last) return 'bot-1';
    if (rank === sLast) return 'bot-2';
    if (rank === tLast) return 'bot-3';
    return 'mid';
  }

  function medalEmoji(rc) {
    const map = { 'top-1':'🏆','top-2':'🥈','top-3':'🥉','bot-1':'💀','bot-2':'😰','bot-3':'😬','mid':'' };
    return map[rc] || '';
  }

  const maxPts = sorted[0]?.poeng || 1;

  // Player rows
  const playerHTML = sorted.map((p, i) => {
    const rc = rowClass(ranks[i]);
    const progPct = maxPts > 0 ? Math.round(p.poeng / maxPts * 100) : 0;
    const med = medalEmoji(rc);
    return `
      <div class="player-row ${rc}">
        <div class="row-prog" style="width:${progPct}%"></div>
        <div class="medal-col">${med}</div>
        <div style="flex:1;min-width:0;position:relative;z-index:1;padding:0 12px">
          <div class="player-name">${p.navn}</div>
          <div class="player-sub">✓ ${p.eks} eks &nbsp;·&nbsp; ~ ${p.vin} vinner &nbsp;·&nbsp; ✗ ${p.feil} feil &nbsp;·&nbsp; 🏆 ${p.champion}</div>
        </div>
        <div class="score-area">
          <div class="pts-num">${p.poeng}</div>
          <div class="pts-unit">poeng</div>
        </div>
      </div>
    `;
  }).join('');

  const nsHTML = d.ikkeLeverte.map(n => `
    <div class="ns-row">⏳ &nbsp;${n}</div>
  `).join('');

  document.getElementById('playerList').innerHTML = playerHTML + nsHTML;

  // ── STATS ──
  const champMax = Math.max(...d.championStats.map(c=>c.antall));
  const champHTML = d.championStats.map(c => `
    <div class="c-row">
      <div class="c-name">${c.lag}</div>
      <div class="c-bar-bg"><div class="c-bar" style="width:${Math.round(c.antall/champMax*100)}%"></div></div>
      <div class="c-n">${c.antall}</div>
    </div>
  `).join('');

  const nTotal = d.norgeK78.vinner + d.norgeK78.uavgjort + d.norgeK78.tap;
  const winP  = Math.round(d.norgeK78.vinner   / nTotal * 100);
  const drawP = Math.round(d.norgeK78.uavgjort / nTotal * 100);
  const lossP = 100 - winP - drawP;

  const matchHTML = d.spilteKamper.map(m => `
    <div class="m-row">
      <div class="m-badge">${m.kamp}</div>
      <div class="m-teams">${m.hjemme} – ${m.borte}</div>
      <div class="m-score">${m.resultat}</div>
    </div>
  `).join('');

  const progTotal = Math.round(d.kamperSpilt / d.totaleKamper * 100);

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-card-label">🏆 VM-vinner – hvem tror folk?</div>
      ${champHTML}
    </div>

    <div class="stat-card">
      <div class="stat-card-label">🇳🇴 K78 – Elfenbenskysten vs Norge</div>
      <div style="font-size:12px;color:rgba(160,185,220,0.3);margin-bottom:10px;">Hvem tror tipperne vinner?</div>
      <div class="no-bar">
        <div class="no-seg no-win"  style="width:${winP}%">${winP>12?winP+'%':''}</div>
        <div class="no-seg no-draw" style="width:${drawP}%">${drawP>12?drawP+'%':''}</div>
        <div class="no-seg no-loss" style="width:${lossP}%">${lossP>12?lossP+'%':''}</div>
      </div>
      <div class="no-legend">
        <div class="no-leg"><div class="no-dot" style="background:#1a8c35"></div>Norge vinner: <strong style="color:rgba(200,230,200,0.6)">${d.norgeK78.vinner}</strong></div>
        <div class="no-leg"><div class="no-dot" style="background:#7a7a00"></div>Uavgjort: <strong style="color:rgba(220,220,160,0.6)">${d.norgeK78.uavgjort}</strong></div>
        <div class="no-leg"><div class="no-dot" style="background:#9a1a1a"></div>Elfenbenskysten: <strong style="color:rgba(230,170,170,0.6)">${d.norgeK78.tap}</strong></div>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-card-label">⚽ Spilte kamper</div>
      ${matchHTML}
      <div class="prog-row">
        <div style="font-size:11px;color:rgba(160,185,220,0.3);min-width:55px;">Fremdrift</div>
        <div class="prog-bg"><div class="prog-fill" style="width:${progTotal}%"></div></div>
        <div class="prog-txt">${progTotal}%</div>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-card-label">🎯 Maks mulige poeng</div>
      <div class="mp-row"><span class="mp-lbl">16-delsfinalene (16×3p)</span><span class="mp-val">48 p</span></div>
      <div class="mp-row"><span class="mp-lbl">Kvartfinale (8 lag × 2p)</span><span class="mp-val">16 p</span></div>
      <div class="mp-row"><span class="mp-lbl">Semifinale (4 lag × 3p)</span><span class="mp-val">12 p</span></div>
      <div class="mp-row"><span class="mp-lbl">Finale (2 lag × 5p)</span><span class="mp-val">10 p</span></div>
      <div class="mp-row"><span class="mp-lbl">Bronsefinale (2 lag × 2p)</span><span class="mp-val">4 p</span></div>
      <div class="mp-row"><span class="mp-lbl">VM-vinner (8p)</span><span class="mp-val">8 p</span></div>
      <div class="mp-row" style="border-top:1px solid rgba(255,255,255,0.07);padding-top:10px;margin-top:6px;">
        <span style="color:#e8eef8;font-weight:700;">TOTALT MAKS</span>
        <span class="mp-total">98 p</span>
      </div>
    </div>
  `;

  // Footer
  const span = sorted[0].poeng - sorted[sorted.length-1].poeng;
  document.getElementById('footerStrip').innerHTML = `
    <div class="f-item"><div class="f-val">${d.kamperSpilt}/${d.totaleKamper}</div><div class="f-lbl">Kamper spilt</div></div>
    <div class="f-item"><div class="f-val">${d.totaleKamper - d.kamperSpilt}</div><div class="f-lbl">Gjenstår</div></div>
    <div class="f-item"><div class="f-val">${span}</div><div class="f-lbl">Poengspenn</div></div>
    <div class="f-item"><div class="f-val" style="color:#ffd700">98</div><div class="f-lbl">Maks poeng</div></div>
  `;
})();
</script>
</body>
</html>
