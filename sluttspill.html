.hero-sub {

}

}
.section-header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
}

  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 20px;
  min-height: 58px;
  border-bottom: 1px solid rgba(255,255,255,0.035);
  position: relative;
  transition: background 0.15s;
  cursor: default;
}
.player-row:hover { background: rgba(80,140,255,0.04); }

/* colored left accent */
.player-row::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.top-1::before { background: linear-gradient(180deg, #ffd700, #ffb300); }
.top-2::before { background: linear-gradient(180deg, #c0cce0, #9aabb8); }
.top-3::before { background: linear-gradient(180deg, #cd8f4a, #a06030); }
.mid::before   { background: transparent; }
.bot-1::before { background: rgba(220,60,60,0.55); }
.bot-2::before { background: rgba(210,60,60,0.35); }
.bot-3::before { background: rgba(200,60,60,0.2); }

/* background shimmer for top */
.top-1 { background: rgba(255,215,0,0.04); }
.top-2 { background: rgba(192,204,224,0.025); }
.top-3 { background: rgba(205,143,74,0.03); }
.bot-1 { background: rgba(200,50,50,0.04); }

}
.top-1 .row-prog { background: #ffd700; }
.top-2 .row-prog { background: #c0cce0; }
.top-3 .row-prog { background: #cd8f4a; }
.mid   .row-prog { background: #3a78ff; }
.bot-1 .row-prog, .bot-2 .row-prog, .bot-3 .row-prog { background: #cc3333; }

  z-index: 1;
  line-height: 1;

.player-name {

  letter-spacing: 2px;

  text-overflow: ellipsis;

.top-1 .player-name { color: #ffd700; }
.top-2 .player-name { color: #ccd8ea; }
.top-3 .player-name { color: #d09a60; }
.mid   .player-name { color: #cad7ee; }
.bot-1 .player-name,
.bot-2 .player-name,
.bot-3 .player-name { color: rgba(200,210,230,0.5); }

.player-sub {
  font-size: 11px;
  color: rgba(160,185,230,0.28);
  font-weight: 600;
  letter-spacing: 0.3px;
  margin-top: 1px;
}

  position: relative;
  z-index: 1;
  text-align: right;
  min-width: 60px;
}
.pts-num {

  letter-spacing: 1px;

.top-1 .pts-num { color: #ffd700; }
.top-2 .pts-num { color: #c0cce0; }
.top-3 .pts-num { color: #cd8f4a; }
.mid   .pts-num { color: rgba(120,165,255,0.7); }

  color: rgba(160,185,220,0.2);

.stats-wrap {

  background: #050d1c;
  border-radius: 0 0 18px 18px;

}
.stats-grid {

        <polygon points="10,48 16,36 24,34 28,42 22,54" stroke="#4da6ff" stroke-width="1.2" fill="rgba(26,80,200,0.2)"/>

        <circle cx="800" cy="40" r="1.2"/><circle cx="60" cy="200" r="0.8"/>

    <div class="hero-meta">
      <div class="hero-meta-item">📅 <span id="dato"></span></div>
      <div class="hero-meta-item">Kamper: <span id="kampMeta"></span></div>
    </div>
    <div class="hero-eyebrow">⚡ VM 2026 — Sluttspill</div>
    <div class="hero-title">MAIHAUGEN<br><em>PLAYOFFS</em></div>
    <div class="hero-sub">16-delsfinale · Kvartfinale · Semifinale · Finale</div>
  </div>
</div>

<!-- ── STANDINGS ── -->
<div class="standings" id="standingsWrap">
  <div class="section-header">
    <div class="section-header-title">🏆 Stillinger</div>
  </div>
  <div id="playerList"></div>
</div>

<!-- ── STATS ── -->
<div class="stats-wrap">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:rgba(80,140,255,0.5);margin-bottom:18px;">STATISTIKK</div>
  <div class="stats-grid" id="statsGrid"></div>
</div>

<!-- ── FOOTER ── -->
<div class="footer-strip" id="footerStrip"></div>

<script>
(function() {
  const d = DATA;

  document.getElementById('dato').textContent = d.oppdatert;
  document.getElementById('kampMeta').innerHTML = `<span>${d.kamperSpilt} / ${d.totaleKamper}</span>`;

  const sorted = [...d.deltakere].sort((a,b) => b.poeng - a.poeng || a.navn.localeCompare(b.navn, 'no'));
  const total = sorted.length;

  // Rank assignment (tied = same rank)
  function getRanks(arr) {
    const ranks = [];
    let r = 1;
    for (let i = 0; i < arr.length; i++) {
      if (i > 0 && arr[i].poeng === arr[i-1].poeng) {
        ranks.push(ranks[i-1]);
      } else {
        ranks.push(r);
      }
      r = i + 2;
    }
    return ranks;
  }
  const ranks = getRanks(sorted);
  const uniqueRanks = [...new Set(ranks)].sort((a,b)=>a-b);

  function rowClass(rank) {
    if (rank === uniqueRanks[0]) return 'top-1';
    if (uniqueRanks[1] !== undefined && rank === uniqueRanks[1]) return 'top-2';
    if (uniqueRanks[2] !== undefined && rank === uniqueRanks[2]) return 'top-3';
    const last = uniqueRanks[uniqueRanks.length-1];
    const sLast = uniqueRanks[uniqueRanks.length-2];
    const tLast = uniqueRanks[uniqueRanks.length-3];
    if (rank === last) return 'bot-1';
    if (rank === sLast) return 'bot-2';
    if (rank === tLast) return 'bot-3';
    return 'mid';
  }

  function medalEmoji(rc) {
    const map = { 'top-1':'🏆','top-2':'🥈','top-3':'🥉','bot-1':'💀','bot-2':'😰','bot-3':'😬','mid':'' };
    return map[rc] || '';
  }

  const maxPts = sorted[0]?.poeng || 1;

  // Player rows
  const playerHTML = sorted.map((p, i) => {
    const rc = rowClass(ranks[i]);
    const progPct = maxPts > 0 ? Math.round(p.poeng / maxPts * 100) : 0;
    const med = medalEmoji(rc);
    return `
      <div class="player-row ${rc}">
        <div class="row-prog" style="width:${progPct}%"></div>
        <div class="medal-col">${med}</div>
        <div style="flex:1;min-width:0;position:relative;z-index:1;padding:0 12px">
          <div class="player-name">${p.navn}</div>
          <div class="player-sub">✓ ${p.eks} eks &nbsp;·&nbsp; ~ ${p.vin} vinner &nbsp;·&nbsp; ✗ ${p.feil} feil &nbsp;·&nbsp; 🏆 ${p.champion}</div>
        </div>
        <div class="score-area">
          <div class="pts-num">${p.poeng}</div>
          <div class="pts-unit">poeng</div>
        </div>
      </div>
    `;
  }).join('');

  const nsHTML = d.ikkeLeverte.map(n => `
    <div class="ns-row">⏳ &nbsp;${n}</div>
  `).join('');

  document.getElementById('playerList').innerHTML = playerHTML + nsHTML;

  // ── STATS ──

  // 8-delsfinale kampoppsett
  let atteHTML = '';
  d.attedelsfinale.forEach(function(m) {
    atteHTML += '<div class="m-row">' +
      '<div class="m-teams" style="color:rgba(200,220,255,0.7);flex:1;">' + m.hjemme + ' – ' + m.borte + '</div>' +
    '</div>';
  });

  // Levende QF-tips per deltaker
  let sjHTML = '';
  d.qfSjanse.forEach(function(p) {
    const pct = Math.round(p.alive / 8 * 100);
    const barColor = p.alive === 8 ? '#1a8c35' : p.alive >= 7 ? '#1a4ccc' : p.alive >= 6 ? '#7a6000' : '#9a1a1a';
    const uteStr = p.ute.length > 0
      ? '<span style="font-size:10px;color:rgba(220,100,100,0.5);margin-left:6px;">✗ ' + p.ute.join(', ') + '</span>'
      : '<span style="font-size:10px;color:rgba(100,220,100,0.5);margin-left:6px;">✓ alle i live</span>';
    sjHTML += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;">' +
      '<div style="font-size:13px;font-weight:700;min-width:72px;color:rgba(210,225,255,0.8);">' + p.navn + '</div>' +
      '<div style="flex:1;height:16px;border-radius:4px;background:rgba(255,255,255,0.05);overflow:hidden;">' +
        '<div style="width:' + pct + '%;height:100%;border-radius:4px;background:' + barColor + ';opacity:0.75;"></div>' +
      '</div>' +
      '<div style="font-size:12px;font-weight:700;color:rgba(160,185,220,0.5);min-width:28px;text-align:right;">' + p.alive + '/8</div>' +
      uteStr +
    '</div>';
  });

  // Hvem tror folk når kvartfinalen
  const qfMax = Math.max(...d.kvartfinaleStats.map(c=>c.antall));
  let qfHTML = '';
  d.kvartfinaleStats.forEach(function(c) {
    qfHTML += '<div class="c-row">' +
      '<div class="c-name">' + c.lag + '</div>' +
      '<div class="c-bar-bg"><div class="c-bar" style="width:' + Math.round(c.antall/qfMax*100) + '%"></div></div>' +
      '<div class="c-n">' + c.antall + '</div>' +
    '</div>';
  });

  // VM-vinner
  const champMax = Math.max(...d.championStats.map(c=>c.antall));
  let champHTML = '';
  d.championStats.forEach(function(c) {
    champHTML += '<div class="c-row">' +
      '<div class="c-name">' + c.lag + '</div>' +
      '<div class="c-bar-bg"><div class="c-bar" style="width:' + Math.round(c.antall/champMax*100) + '%"></div></div>' +
      '<div class="c-n">' + c.antall + '</div>' +
    '</div>';
  });

  // Spilte kamper
  let matchHTML = '';
  d.spilteKamper.forEach(function(m) {
    matchHTML += '<div class="m-row">' +
      '<div class="m-badge">' + m.kamp + '</div>' +
      '<div class="m-teams">' + m.hjemme + ' – ' + m.borte + '</div>' +
      '<div class="m-score">' + m.resultat + '</div>' +
    '</div>';
  });

  const progTotal = Math.round(d.kamperSpilt / d.totaleKamper * 100);

  document.getElementById('statsGrid').innerHTML =
    '<div class="stat-card">' +
      '<div class="stat-card-label">⚔️ 8-delsfinale – kampoppsett</div>' +
      '<div style="font-size:11px;color:rgba(160,185,220,0.3);margin-bottom:10px;">Starter 4. juli</div>' +
      atteHTML +
    '</div>' +
    '<div class="stat-card" style="grid-column:1/-1;">' +
      '<div class="stat-card-label">🎯 Levende kvartfinale-tips per deltaker</div>' +
      '<div style="font-size:11px;color:rgba(160,185,220,0.3);margin-bottom:12px;">Av 8 tippede lag – hvor mange er fortsatt i turneringen?</div>' +
      sjHTML +
    '</div>' +
    '<div class="stat-card">' +
      '<div class="stat-card-label">🔮 Hvem tror folk når kvartfinalen?</div>' +
      qfHTML +
    '</div>' +
    '<div class="stat-card">' +
      '<div class="stat-card-label">🏆 VM-vinner – hvem tror folk?</div>' +
      champHTML +
    '</div>' +
    '<div class="stat-card">' +
      '<div class="stat-card-label">⚽ Spilte kamper (16-delsfinale)</div>' +
      matchHTML +
      '<div class="prog-row">' +
        '<div style="font-size:11px;color:rgba(160,185,220,0.3);min-width:55px;">Fremdrift</div>' +
        '<div class="prog-bg"><div class="prog-fill" style="width:' + progTotal + '%"></div></div>' +
        '<div class="prog-txt">' + progTotal + '%</div>' +
      '</div>' +
    '</div>' +
    '<div class="stat-card">' +
      '<div class="stat-card-label">🎯 Gjenstående poengmuligheter</div>' +
      '<div class="mp-row"><span class="mp-lbl">16-delsfinalene (ferdig)</span><span class="mp-val" style="color:rgba(100,180,100,0.5)">48 p ✓</span></div>' +
      '<div class="mp-row"><span class="mp-lbl">Kvartfinale (8 lag × 2p)</span><span class="mp-val">16 p</span></div>' +
      '<div class="mp-row"><span class="mp-lbl">Semifinale (4 lag × 3p)</span><span class="mp-val">12 p</span></div>' +
      '<div class="mp-row"><span class="mp-lbl">Finale (2 lag × 5p)</span><span class="mp-val">10 p</span></div>' +
      '<div class="mp-row"><span class="mp-lbl">Bronsefinale (2 lag × 2p)</span><span class="mp-val">4 p</span></div>' +
      '<div class="mp-row"><span class="mp-lbl">VM-vinner (8p)</span><span class="mp-val">8 p</span></div>' +
      '<div class="mp-row" style="border-top:1px solid rgba(255,255,255,0.07);padding-top:10px;margin-top:6px;">' +
        '<span style="color:#e8eef8;font-weight:700;">GJENSTÅR MAKS</span>' +
        '<span class="mp-total">50 p</span>' +
      '</div>' +
    '</div>';

  // Footer
  const span = sorted[0].poeng - sorted[sorted.length-1].poeng;
  document.getElementById('footerStrip').innerHTML = `
    <div class="f-item"><div class="f-val">${d.kamperSpilt}/${d.totaleKamper}</div><div class="f-lbl">Kamper spilt</div></div>
    <div class="f-item"><div class="f-val">${d.totaleKamper - d.kamperSpilt}</div><div class="f-lbl">Gjenstår</div></div>
    <div class="f-item"><div class="f-val">${span}</div><div class="f-lbl">Poengspenn</div></div>
    <div class="f-item"><div class="f-val" style="color:#ffd700">98</div><div class="f-lbl">Maks poeng</div></div>
  `;
})();
</script>
</body>
</html>
