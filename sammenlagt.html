<div class="page">
  <div class="header">
    <div class="header-eyebrow">Maihaugen Tippekonkurranse · VM 2026</div>
    <h1>SAMMENLAGT<br><span>STILLINGSLISTE</span></h1>
    <div class="header-sub">Grunnspill + Del 1 + Del 2</div>
    <div class="header-meta">
      <div class="meta-pill" id="meta-dato">Oppdatert –</div>
      <div class="meta-pill" id="meta-del2">Del 2: –</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot dot-grunn"></div>Grunnspill
    </div>
    <div class="legend-item">
      <div class="legend-dot dot-del1"></div>Sluttspill Del 1
    </div>
    <div class="legend-item">
      <div class="legend-dot dot-del2"></div>Del 2 (pågår)
    </div>
  </div>

  <div class="summary-cards" id="summary-cards"></div>

<div class="footer" id="footer"></div>

<script>
DATA.deltakere.forEach(d => { d.total = d.grunn + d.del1 + d.del2; });
DATA.deltakere.sort((a, b) => b.total - a.total || a.navn.localeCompare(b.navn, 'no'));

const n = DATA.deltakere.length;
const maxTotal = DATA.deltakere[0].total;

// Compute ranks (standard competition ranking: tied = same rank, next rank skips)
let rank = 1;
for (let i = 0; i < n; i++) {
  if (i > 0 && DATA.deltakere[i].total !== DATA.deltakere[i-1].total) {
    rank = i + 1;
  }
  DATA.deltakere[i].rank = rank;
}

function topIcon(rank) {
  if (rank === 1) return '🥇';
  if (rank === 2) return '🥈';
  if (rank === 3) return '🥉';
  return '';
}

function botIcon(idx) {
  if (idx === n - 1) return '🪑';
  if (idx === n - 2) return '😅';
  if (idx === n - 3) return '🪵';
  return '';
}

function rowClass(d, idx) {
  if (d.rank === 1) return 'row row-top-1';
  if (d.rank === 2) return 'row row-top-2';
  if (d.rank === 3) return 'row row-top-3';
  if (idx >= n - 3) return 'row row-bottom';
  return 'row row-mid';
}

function pct(a, b) { return b > 0 ? (a / b * 100).toFixed(3) + '%' : '0%'; }

// ── Header meta ────────────────────────────────────────
document.getElementById('meta-dato').textContent = 'Oppdatert ' + DATA.oppdatert;
document.getElementById('meta-del2').textContent = 'Del 2: ' + DATA.del2Status;

// ── Summary cards ──────────────────────────────────────
const grunnMax = Math.max(...DATA.deltakere.map(d => d.grunn));
const del1Max  = Math.max(...DATA.deltakere.map(d => d.del1));
const del2Max  = Math.max(...DATA.deltakere.map(d => d.del2));

document.getElementById('summary-cards').innerHTML = `
  <div class="sum-card">
    <div class="sum-card-label lbl-grunn">Grunnspill</div>
    <div class="sum-card-val">${grunnMax}p</div>
    <div class="sum-card-sub">72 kamper · maks</div>
  </div>
  <div class="sum-card">
    <div class="sum-card-label lbl-del1">Del 1</div>
    <div class="sum-card-val">${del1Max}p</div>
    <div class="sum-card-sub">16 kamper · maks</div>
  </div>
  <div class="sum-card">
    <div class="sum-card-label lbl-del2">Del 2</div>
    <div class="sum-card-val">${del2Max}p</div>
    <div class="sum-card-sub">${DATA.del2Status}</div>
  </div>
`;

// ── List ───────────────────────────────────────────────
const list = document.getElementById('list');
let prevSectionClass = 'top';

DATA.deltakere.forEach((d, idx) => {
  const icon = topIcon(d.rank) || botIcon(idx);
  const cls  = rowClass(d, idx);
  const curSection = d.rank <= 3 ? 'top' : idx >= n - 3 ? 'bot' : 'mid';

  if (idx > 0 && curSection !== prevSectionClass) {
    const label = curSection === 'mid' ? 'Midtsjiktet' : 'Bunnen';
    list.insertAdjacentHTML('beforeend', `
      <div class="section-divider">
        <div class="div-line"></div>
        <div class="div-label">${label}</div>
        <div class="div-line"></div>
      </div>
    `);
  }
  prevSectionClass = curSection;

  const barW   = pct(d.total, maxTotal);
  const grunnW = pct(d.grunn, d.total);
  const del1W  = pct(d.del1, d.total);
  const del2W  = pct(d.del2, d.total);

  const noTag   = d.ingenSluttspill ? `<span class="no-sluttspill-tag">kun grunn</span>` : '';
  const bpDel1  = d.del1 > 0 ? `<span class="bp-sep">·</span><span class="bp">Del 1 <span>${d.del1}p</span></span>` : '';
  const bpDel2  = d.del2 > 0 ? `<span class="bp-sep">·</span><span class="bp">Del 2 <span>${d.del2}p</span></span>` : '';

  const seg1 = d.del1 > 0
    ? `<div class="seg seg-gap"></div><div class="seg seg-del1" style="width:${del1W}"></div>`
    : '';
  const seg2 = d.del2 > 0
    ? `<div class="seg seg-gap"></div><div class="seg seg-del2" style="width:${del2W}"></div>`
    : '';

  list.insertAdjacentHTML('beforeend', `
    <div class="${cls}">
      <div class="row-head">
        <div class="rank-badge">
          <span class="rank-num">${d.rank}</span>
          ${icon ? `<span class="rank-icon">${icon}</span>` : ''}
        </div>
        <div class="name">${d.navn}</div>
        ${noTag}
        <div class="total">${d.total}<span class="total-pts">p</span></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill" style="width:${barW}">
          <div class="seg seg-grunn" style="width:${grunnW}"></div>
          ${seg1}
          ${seg2}
        </div>
      </div>
      <div class="breakdown">
        <span class="bp">Grunn <span>${d.grunn}p</span></span>
        ${bpDel1}
        ${bpDel2}
      </div>
    </div>
  `);
});

// ── Footer ─────────────────────────────────────────────
document.getElementById('footer').innerHTML = `
  <strong>* Petter og Ragnhild</strong> leverte ikke sluttspillskjema – kun grunnspillpoeng teller for dem.<br>
  Del 2 pågår fortsatt – ${DATA.del2Status}.
`;
</script>
